# Power Manage — PostgreSQL host-based authentication (spec 32: datastore mTLS).
#
# Mounted read-only at /etc/postgresql/pg_hba.conf and selected via `-c
# hba_file=` in the compose entrypoint (so initdb's generated pg_hba in the data
# dir is bypassed). No plaintext TCP is permitted.
#
# Bootstrap paths use the local unix socket (trust): initdb's role creation in
# docker-entrypoint-initdb.d and the `pg_isready` healthcheck. Every TCP client
# MUST present a CA-signed client certificate over TLS; the `cert` method maps
# the certificate CN to the DB role, so the client certs setup.sh issues carry
# the role as their CN (control-datastore CN=powermanage, indexer-datastore
# CN=pm_indexer). clientcert=verify-full additionally pins the full chain.

# TYPE     DATABASE  USER  ADDRESS      METHOD
local      all       all                trust
hostssl    all       all   0.0.0.0/0    cert clientcert=verify-full
hostssl    all       all   ::/0         cert clientcert=verify-full

# Explicitly reject any non-TLS TCP. hostssl already refuses to match a
# plaintext connection; this makes the fail-closed posture unmistakable.
host       all       all   0.0.0.0/0    reject
host       all       all   ::/0         reject
