# Power Manage Server - Docker/Podman Compose
#
# Brings up the full stack: Traefik, PostgreSQL, Control Server, and Gateway.
# Traefik handles TLS termination with automatic Let's Encrypt certificates.
#
# Usage:
#   1. cp .env.example .env && $EDITOR .env
#   2. ./setup.sh            (generates internal CA + gateway/control certs)
#   3. docker compose up -d  (or: podman-compose up -d)
#
# Architecture:
#   Internet -> Traefik (:443, HTTPS)       -> Control (:8081) -> Web UI / API
#            -> Traefik (:443, TCP passthru) -> Gateway (:8080) -> Agent mTLS Streaming
#              (:80 redirects to :443 for control only)

services:
  traefik:
    image: docker.io/traefik:v3
    container_name: pm-traefik
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik:/letsencrypt
      # spec 32: only the CA + Traefik's own client keypair — never ca.key.
      - ./certs/ca.crt:/certs/ca.crt:ro,z
      - ./certs/traefik-datastore.crt:/certs/traefik-datastore.crt:ro,z
      - ./certs/traefik-datastore.key:/certs/traefik-datastore.key:ro,z
    command:
      # Docker provider stays for the non-gateway services
      # (control, indexer) that don't scale horizontally.
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=pm-internal"
      # Redis KV provider — each gateway replica self-registers its
      # routing config into Valkey at startup (see
      # server/cmd/gateway/main.go). Lets `docker compose up
      # --scale gateway=N` work without per-replica labels.
      - "--providers.redis=true"
      - "--providers.redis.endpoints=valkey:6379"
      # spec 32: read-only ACL user + datastore mutual TLS. Traefik is the
      # internet-facing, Docker-socket-exposed component, so it gets the most
      # confined Valkey credential (traefik/* read-only) and still authenticates
      # with a CA-signed client cert.
      - "--providers.redis.username=pm-traefik"
      - "--providers.redis.password=${VALKEY_TRAEFIK_PASSWORD}"
      - "--providers.redis.rootkey=traefik"
      - "--providers.redis.tls.ca=/certs/ca.crt"
      - "--providers.redis.tls.cert=/certs/traefik-datastore.crt"
      - "--providers.redis.tls.key=/certs/traefik-datastore.key"
      - "--entrypoints.web.address=:80"
      # One :443 entrypoint serves both the LE-terminated HTTP
      # routers (control) and the gateway's TCP-passthrough mTLS
      # router. Traefik dispatches by SNI: a TCP router with
      # HostSNI(${GATEWAY_DOMAIN}) + tls.passthrough=true takes
      # precedence when the ClientHello SNI matches the gateway
      # subdomain; otherwise the HTTP router for the control
      # subdomain wins and terminates TLS normally. No dedicated
      # mtls entrypoint is needed — that used to be on :8443 but
      # splitting ports added deploy friction for no real benefit.
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal

  postgres:
    image: docker.io/postgres:18-alpine
    container_name: pm-postgres
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql:z
      - ./initdb.d:/docker-entrypoint-initdb.d:ro,z
      # spec 32: TLS server cert + CA + the mTLS host-based auth rules.
      - ./certs/ca.crt:/certs/ca.crt:ro,z
      - ./certs/postgres.crt:/certs/postgres.crt:ro,z
      - ./certs/postgres.key:/certs/postgres.key:ro,z
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro,z
    # spec 32: enable TLS + client-cert auth. The server process runs as uid 70
    # (postgres) after docker-entrypoint drops privileges, so it cannot read the
    # root/deploy-owned 0600 key on the read-only mount — copy it to a
    # postgres-owned path first, then hand off to the stock entrypoint with the
    # ssl + hba flags. `-c hba_file=` bypasses initdb's generated pg_hba.
    entrypoint:
      - "sh"
      - "-c"
      - "cp /certs/postgres.key /tmp/postgres.key && chown postgres:postgres /tmp/postgres.key && chmod 600 /tmp/postgres.key && exec docker-entrypoint.sh postgres -c ssl=on -c ssl_cert_file=/certs/postgres.crt -c ssl_key_file=/tmp/postgres.key -c ssl_ca_file=/certs/ca.crt -c hba_file=/etc/postgresql/pg_hba.conf"
    environment:
      - POSTGRES_USER=powermanage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=powermanage
      - INDEXER_POSTGRES_PASSWORD=${INDEXER_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "powermanage"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - internal

  valkey:
    # Pinned to avoid silent upstream upgrades. Bump deliberately when
    # you've verified the valkey-search module + data format still
    # work for your deployment. The bundle image carries valkey-server
    # plus the search / json / bloom / ldap modules under
    # /usr/lib/valkey/; its entrypoint auto-loads any .so it finds
    # there that isn't already loaded by the config file.
    image: docker.io/valkey/valkey-bundle:9.1.0
    container_name: pm-valkey
    restart: unless-stopped
    volumes:
      - ./data/valkey:/data:z
      # valkey.conf is rendered from valkey.conf.template at setup time
      # (spec 32: with the four per-service ACL passwords substituted in).
      # Mounted read-only so a runtime container compromise can't tamper with it.
      - ./valkey.conf:/etc/valkey/valkey.conf:ro,z
      # spec 32: TLS server cert + CA. valkey-bundle runs as root, so it reads
      # the 0600 key directly — no copy/chown dance (unlike Postgres uid 70).
      - ./certs/ca.crt:/certs/ca.crt:ro,z
      - ./certs/valkey.crt:/certs/valkey.crt:ro,z
      - ./certs/valkey.key:/certs/valkey.key:ro,z
    # Secrets-in-cmdline hardening (audit F-03): the password used
    # to live in `--requirepass ${VALKEY_PASSWORD}` here, which made
    # it readable to anything with PID-namespace access via
    # /proc/<pid>/cmdline. Now the password is in /etc/valkey/valkey.conf
    # (file permissions enforced by the bind-mount), and the health
    # check authenticates via REDISCLI_AUTH so the cmdline of the
    # one-shot valkey-cli probe stays clean too.
    #
    # Command must invoke `valkey-server` (not its `redis-server`
    # symlink) so the bundle's entrypoint takes the module-autoload
    # branch — see bundle-docker-entrypoint.sh.
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    # spec 32: the plaintext port is disabled (port 0 + tls-port 6379), so the
    # healthcheck must speak TLS with a client cert and authenticate as an ACL
    # user (default user is off). It presents the server keypair as its client
    # cert (valkey.crt carries clientAuth EKU) and pings as pm-control over
    # localhost (in the cert SAN). If you tune the pm-control ACL, keep +ping.
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -h localhost --tls --cert /certs/valkey.crt --key /certs/valkey.key --cacert /certs/ca.crt --user pm-control -a \"$$VALKEY_CONTROL_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 3
    environment:
      # Exposed to the container solely so the healthcheck shell can authenticate
      # as pm-control. Namespace-isolated to this container; not a cmdline arg.
      - VALKEY_CONTROL_PASSWORD=${VALKEY_CONTROL_PASSWORD}
    networks:
      - internal

  control:
    image: ghcr.io/manchtools/power-manage-control:${IMAGE_TAG:-latest}
    container_name: pm-control
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ./certs:/certs:ro,z
    environment:
      - CONTROL_LISTEN_ADDR=:8081
      # spec 32: mutual TLS to Postgres. verify-full + client cert (CN=powermanage
      # maps to the DB role via pg_hba `cert`); no password in the DSN — the cert
      # is the credential. Control refuses to boot on anything less (fail closed).
      - CONTROL_DATABASE_URL=postgres://powermanage@postgres:5432/powermanage?sslmode=verify-full&sslrootcert=/certs/ca.crt&sslcert=/certs/control-datastore.crt&sslkey=/certs/control-datastore.key
      - CONTROL_CA_CERT=/certs/ca.crt
      - CONTROL_CA_KEY=/certs/ca.key
      - CONTROL_JWT_SECRET=${JWT_SECRET}
      - CONTROL_ADMIN_EMAIL=${ADMIN_EMAIL}
      - CONTROL_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CONTROL_GATEWAY_URL=https://${GATEWAY_DOMAIN}
      # spec 31: shared bootstrap token gateways present to EnrollGateway. Same
      # PM_* cross-service secret the gateway reads (like PM_TASK_SIGNING_KEY).
      - PM_GATEWAY_ENROLL_TOKEN=${PM_GATEWAY_ENROLL_TOKEN}
      - CONTROL_LOG_LEVEL=${LOG_LEVEL:-info}
      - CONTROL_LOG_FORMAT=${LOG_FORMAT:-text}
      - CONTROL_CORS_ORIGINS=${CORS_ORIGINS:-}
      - CONTROL_DYNAMIC_GROUP_EVAL_INTERVAL=${DYNAMIC_GROUP_EVAL_INTERVAL:-1h}
      - CONTROL_SSO_CALLBACK_BASE_URL=${CONTROL_SSO_CALLBACK_BASE_URL:-}
      - CONTROL_SCIM_BASE_URL=${CONTROL_SCIM_BASE_URL:-}
      # CONTROL_ENCRYPTION_KEY is mandatory (32-byte AES key, hex-encoded:
      # `openssl rand -hex 32`). The control server refuses to boot without it —
      # there is no plaintext opt-out.
      - CONTROL_ENCRYPTION_KEY=${CONTROL_ENCRYPTION_KEY:?CONTROL_ENCRYPTION_KEY is required}
      - CONTROL_INTERNAL_LISTEN_ADDR=:8082
      - CONTROL_INTERNAL_TLS_CERT=/certs/control.crt
      - CONTROL_INTERNAL_TLS_KEY=/certs/control.key
      - CONTROL_PASSWORD_AUTH_ENABLED=${CONTROL_PASSWORD_AUTH_ENABLED:-true}
      - CONTROL_TRUSTED_PROXIES=${CONTROL_TRUSTED_PROXIES:-}
      - CONTROL_SSH_ACCESS_FOR_ALL=${CONTROL_SSH_ACCESS_FOR_ALL:-false}
      - CONTROL_VALKEY_ADDR=valkey:6379
      # spec 32: per-service ACL user + datastore mutual TLS (no plaintext fallback).
      - CONTROL_VALKEY_USERNAME=pm-control
      - CONTROL_VALKEY_PASSWORD=${VALKEY_CONTROL_PASSWORD}
      - CONTROL_VALKEY_TLS_CERT=/certs/control-datastore.crt
      - CONTROL_VALKEY_TLS_KEY=/certs/control-datastore.key
      - CONTROL_VALKEY_TLS_CA=/certs/ca.crt
      # Asynq task signing (audit F-02). Identical 64-hex value on
      # control, gateway, and indexer — they HMAC every task payload
      # so a Valkey compromise can't forge dispatches.
      - PM_TASK_SIGNING_KEY=${PM_TASK_SIGNING_KEY}
      # Remote terminal fallback URL for single-gateway deployments.
      # Leave empty when using multi-gateway routing (the control
      # server resolves the correct gateway from the registry).
      - CONTROL_TERMINAL_GATEWAY_URL=${CONTROL_TERMINAL_GATEWAY_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.control.rule=Host(`${CONTROL_DOMAIN}`)"
      - "traefik.http.routers.control.entrypoints=websecure"
      - "traefik.http.routers.control.tls.certresolver=letsencrypt"
      - "traefik.http.routers.control.middlewares=pm-headers"
      - "traefik.http.middlewares.pm-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.services.control.loadbalancer.server.port=8081"
    networks:
      - internal

  indexer:
    image: ghcr.io/manchtools/power-manage-indexer:${IMAGE_TAG:-latest}
    container_name: pm-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      # spec 32: CA + the indexer's own datastore client keypair (CN=pm_indexer).
      - ./certs/ca.crt:/certs/ca.crt:ro,z
      - ./certs/indexer-datastore.crt:/certs/indexer-datastore.crt:ro,z
      - ./certs/indexer-datastore.key:/certs/indexer-datastore.key:ro,z
    environment:
      # spec 32: mutual TLS to Postgres (verify-full + client cert; CN=pm_indexer
      # maps to the read-only role). No password — the cert is the credential.
      - INDEXER_DATABASE_URL=postgres://pm_indexer@postgres:5432/powermanage?sslmode=verify-full&sslrootcert=/certs/ca.crt&sslcert=/certs/indexer-datastore.crt&sslkey=/certs/indexer-datastore.key
      - INDEXER_VALKEY_ADDR=valkey:6379
      # spec 32: per-service ACL user + datastore mutual TLS.
      - INDEXER_VALKEY_USERNAME=pm-indexer
      - INDEXER_VALKEY_PASSWORD=${VALKEY_INDEXER_PASSWORD}
      - INDEXER_VALKEY_TLS_CERT=/certs/indexer-datastore.crt
      - INDEXER_VALKEY_TLS_KEY=/certs/indexer-datastore.key
      - INDEXER_VALKEY_TLS_CA=/certs/ca.crt
      - PM_TASK_SIGNING_KEY=${PM_TASK_SIGNING_KEY}
      - INDEXER_RECONCILE_INTERVAL=1h
      - INDEXER_LOG_LEVEL=${LOG_LEVEL:-info}
      - INDEXER_LOG_FORMAT=${LOG_FORMAT:-text}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  gateway:
    # No container_name: scaling to N replicas needs Compose to auto-name
    # containers (pm-server-gateway-1, -2, ...). Self-registration into
    # Traefik's Redis KV means no per-replica Traefik labels are needed.
    image: ghcr.io/manchtools/power-manage-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
      control:
        condition: service_healthy
    volumes:
      # spec 31: the gateway self-enrolls its agent-facing cert on boot (held in
      # memory) — no static gateway.crt/key, and never the CA signing key on disk.
      # spec 32: it DOES need a static datastore client keypair (CN=pm-gateway) +
      # the CA cert to reach Valkey over mutual TLS. This is separate from the
      # per-boot enrolled identity, so datastore access doesn't gate on enrollment.
      - ./certs/ca.crt:/certs/ca.crt:ro,z
      - ./certs/gateway-datastore.crt:/certs/gateway-datastore.crt:ro,z
      - ./certs/gateway-datastore.key:/certs/gateway-datastore.key:ro,z
    environment:
      - GATEWAY_VALKEY_ADDR=valkey:6379
      # spec 32: per-service ACL user + datastore mutual TLS.
      - GATEWAY_VALKEY_USERNAME=pm-gateway
      - GATEWAY_VALKEY_PASSWORD=${VALKEY_GATEWAY_PASSWORD}
      - GATEWAY_VALKEY_TLS_CERT=/certs/gateway-datastore.crt
      - GATEWAY_VALKEY_TLS_KEY=/certs/gateway-datastore.key
      - GATEWAY_VALKEY_TLS_CA=/certs/ca.crt
      - GATEWAY_VALKEY_DB=${GATEWAY_VALKEY_DB:-0}
      - PM_TASK_SIGNING_KEY=${PM_TASK_SIGNING_KEY}
      - GATEWAY_CONTROL_URL=https://control:8082
      # spec 31 self-enrollment: the shared bootstrap token (the same PM_* secret
      # control reads) and control's PUBLIC URL where EnrollGateway is served. The
      # enrolled cert's DNS SAN is taken from GATEWAY_DOMAIN below (the gateway's
      # public host) — there is no separate GATEWAY_HOSTNAME.
      - PM_GATEWAY_ENROLL_TOKEN=${PM_GATEWAY_ENROLL_TOKEN}
      - GATEWAY_CONTROL_ENROLL_URL=https://${CONTROL_DOMAIN}
      - GATEWAY_LISTEN_ADDR=:8080
      - GATEWAY_LOG_LEVEL=${LOG_LEVEL:-info}
      # rc3: configurable agent heartbeat cadence (Go duration, 5s..5m).
      - GATEWAY_HEARTBEAT_INTERVAL=${GATEWAY_HEARTBEAT_INTERVAL:-30s}
      # Remote terminal (multi-gateway routing). Leave empty to disable.
      # (spec 31: GATEWAY_ID is superseded — the gateway_id is the enrolled cert
      # CN, a fresh ULID per boot — so it is no longer passed here.)
      - GATEWAY_PUBLIC_TERMINAL_URL_TEMPLATE=${GATEWAY_PUBLIC_TERMINAL_URL_TEMPLATE:-}
      - GATEWAY_BOOTSTRAP_HOST=${GATEWAY_BOOTSTRAP_HOST:-}
      - GATEWAY_WEB_LISTEN_ADDR=${GATEWAY_WEB_LISTEN_ADDR:-}
      - GATEWAY_INTERNAL_URL=${GATEWAY_INTERNAL_URL:-}
      # Traefik self-registration via Redis KV. The gateway publishes
      # its own routing entry into Valkey at startup; each replica's
      # backend host:port is auto-derived from the container's IP on
      # the pm-internal network plus the listener ports below.
      #
      # Everything else has a sensible default inside the binary
      # (SelfRegister=true, RootKey=traefik, entrypoints=websecure,
      # TTY cert resolver=letsencrypt, MTLS host=GATEWAY_DOMAIN,
      # TTY host=GATEWAY_TTY_DOMAIN). Only override via
      # GATEWAY_TRAEFIK_* in .env when your Traefik topology diverges
      # from the reference stack.
      - GATEWAY_DOMAIN=${GATEWAY_DOMAIN}
      - GATEWAY_TTY_DOMAIN=${GATEWAY_TTY_DOMAIN:-}
    # No command flags (spec 31): the static -tls-cert/-tls-key/-tls-ca flags
    # were removed; the gateway self-enrolls on boot.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

networks:
  internal:
    name: pm-internal
    driver: bridge
