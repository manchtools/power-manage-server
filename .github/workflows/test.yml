name: Tests

on:
  push:
    branches: [main, 'v*']
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'internal/**'
      - 'cmd/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'internal/**'
      - 'cmd/**'
      - '.github/workflows/test.yml'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SDK ref
        id: sdk_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if git ls-remote --heads https://github.com/MANCHTOOLS/power-manage-sdk.git "refs/heads/${BRANCH}" | grep -q .; then
            echo "ref=${BRANCH}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          repository: MANCHTOOLS/power-manage-sdk
          ref: ${{ steps.sdk_ref.outputs.ref }}
          path: _sdk

      - name: Rewrite SDK replace directive
        run: go mod edit -replace github.com/manchtools/power-manage/sdk=./_sdk

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -count=1 ./internal/auth/... ./internal/connection/... ./internal/middleware/... ./internal/taskqueue/... ./internal/config/... ./internal/mtls/... ./internal/crypto/...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SDK ref
        id: sdk_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if git ls-remote --heads https://github.com/MANCHTOOLS/power-manage-sdk.git "refs/heads/${BRANCH}" | grep -q .; then
            echo "ref=${BRANCH}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          repository: MANCHTOOLS/power-manage-sdk
          ref: ${{ steps.sdk_ref.outputs.ref }}
          path: _sdk

      - name: Rewrite SDK replace directive
        run: go mod edit -replace github.com/manchtools/power-manage/sdk=./_sdk

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: go test -count=1 -timeout 20m ./internal/store/... ./internal/api/... ./internal/handler/... ./internal/search/... ./internal/control/... ./internal/gateway/... ./internal/scim/... ./internal/ca/... ./internal/idp/...
