name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve SDK ref
        id: sdk_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if git ls-remote --tags https://github.com/MANCHTOOLS/power-manage-sdk.git "refs/tags/${TAG}" | grep -q .; then
            echo "ref=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout SDK
        uses: actions/checkout@v5
        with:
          repository: MANCHTOOLS/power-manage-sdk
          ref: ${{ steps.sdk_ref.outputs.ref }}
          path: _sdk

      - name: Rewrite SDK replace directive
        run: go mod edit -replace github.com/manchtools/power-manage/sdk=./_sdk

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -count=1 ./internal/auth/... ./internal/connection/...

      - name: Run integration tests
        run: go test -count=1 -timeout 20m ./internal/store/... ./internal/api/... ./internal/handler/... ./internal/search/...

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Resolve SDK ref
        id: sdk_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if git ls-remote --tags https://github.com/MANCHTOOLS/power-manage-sdk.git "refs/tags/${TAG}" | grep -q .; then
            echo "ref=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout SDK
        uses: actions/checkout@v5
        with:
          repository: MANCHTOOLS/power-manage-sdk
          ref: ${{ steps.sdk_ref.outputs.ref }}
          path: _sdk

      - name: Rewrite SDK replace directive
        run: go mod edit -replace github.com/manchtools/power-manage/sdk=./_sdk

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "$GITHUB_REF_NAME" == *-rc* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build control
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/control-linux-${{ matrix.arch }} ./cmd/control

      - name: Build gateway
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/gateway-linux-${{ matrix.arch }} ./cmd/gateway

      - name: Build indexer
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/indexer-linux-${{ matrix.arch }} ./cmd/indexer

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.arch }}
          path: dist/

  containers:
    name: Container images (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: binaries-${{ matrix.arch }}
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push control image
        run: |
          chmod +x dist/control-linux-${{ matrix.arch }}
          cat > Dockerfile.control <<'DEOF'
          FROM docker.io/library/alpine:3.21
          RUN apk add --no-cache ca-certificates
          COPY dist/control-linux-* /usr/local/bin/control
          EXPOSE 8081
          ENTRYPOINT ["/usr/local/bin/control"]
          DEOF
          docker build --provenance=false -f Dockerfile.control -t ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-${{ matrix.arch }} .
          docker push ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-${{ matrix.arch }}

      - name: Build and push gateway image
        run: |
          chmod +x dist/gateway-linux-${{ matrix.arch }}
          cat > Dockerfile.gateway <<'DEOF'
          FROM docker.io/library/alpine:3.21
          RUN apk add --no-cache ca-certificates
          COPY dist/gateway-linux-* /usr/local/bin/gateway
          EXPOSE 8080
          ENTRYPOINT ["/usr/local/bin/gateway"]
          DEOF
          docker build --provenance=false -f Dockerfile.gateway -t ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-${{ matrix.arch }} .
          docker push ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-${{ matrix.arch }}

      - name: Build and push indexer image
        run: |
          chmod +x dist/indexer-linux-${{ matrix.arch }}
          cat > Dockerfile.indexer <<'DEOF'
          FROM docker.io/library/alpine:3.21
          RUN apk add --no-cache ca-certificates
          COPY dist/indexer-linux-* /usr/local/bin/indexer
          EXPOSE 8082
          ENTRYPOINT ["/usr/local/bin/indexer"]
          DEOF
          docker build --provenance=false -f Dockerfile.indexer -t ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-${{ matrix.arch }} .
          docker push ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-${{ matrix.arch }}

  manifests:
    name: Multi-arch manifests
    runs-on: ubuntu-latest
    needs: [build, containers]
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create control version manifest
        run: |
          docker manifest create ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }} \
            ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}

      - name: Update control latest-rc tag
        if: ${{ needs.build.outputs.is_prerelease == 'true' }}
        run: |
          docker manifest create --amend ghcr.io/manchtools/power-manage-control:latest-rc \
            ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-control:latest-rc

      - name: Update control latest tag
        if: ${{ needs.build.outputs.is_prerelease == 'false' }}
        run: |
          docker manifest create --amend ghcr.io/manchtools/power-manage-control:latest \
            ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-control:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-control:latest

      - name: Create gateway version manifest
        run: |
          docker manifest create ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }} \
            ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}

      - name: Update gateway latest-rc tag
        if: ${{ needs.build.outputs.is_prerelease == 'true' }}
        run: |
          docker manifest create --amend ghcr.io/manchtools/power-manage-gateway:latest-rc \
            ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-gateway:latest-rc

      - name: Update gateway latest tag
        if: ${{ needs.build.outputs.is_prerelease == 'false' }}
        run: |
          docker manifest create --amend ghcr.io/manchtools/power-manage-gateway:latest \
            ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-gateway:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-gateway:latest

      - name: Create indexer version manifest
        run: |
          docker manifest create ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }} \
            ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}

      - name: Update indexer latest-rc tag
        if: ${{ needs.build.outputs.is_prerelease == 'true' }}
        run: |
          docker manifest create --amend ghcr.io/manchtools/power-manage-indexer:latest-rc \
            ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-indexer:latest-rc

      - name: Update indexer latest tag
        if: ${{ needs.build.outputs.is_prerelease == 'false' }}
        run: |
          docker manifest create --amend ghcr.io/manchtools/power-manage-indexer:latest \
            ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/manchtools/power-manage-indexer:${{ steps.version.outputs.version }}-arm64
          docker manifest push ghcr.io/manchtools/power-manage-indexer:latest

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, manifests]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/binaries-amd64/* release/
          cp artifacts/binaries-arm64/* release/
          cd release && sha256sum * > SHA256SUMS

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              for entry in "feat:Features" "fix:Bug Fixes" "perf:Performance" "refactor:Refactoring" "docs:Documentation" "test:Tests" "chore:Chores"; do
                prefix="${entry%%:*}"
                label="${entry#*:}"
                items=$(git log --pretty=format:"%s" "${PREV_TAG}..${GITHUB_REF_NAME}" | grep "^${prefix}[:(]" | sed "s/^${prefix}[^:]*: //" || true)
                if [ -n "$items" ]; then
                  echo "### ${label}"
                  echo "$items" | while IFS= read -r line; do echo "- ${line}"; done
                  echo ""
                fi
              done
              others=$(git log --pretty=format:"%s" "${PREV_TAG}..${GITHUB_REF_NAME}" | grep -v "^\(feat\|fix\|perf\|refactor\|docs\|test\|chore\)[:(]" || true)
              if [ -n "$others" ]; then
                echo "### Other Changes"
                echo "$others" | while IFS= read -r line; do echo "- ${line}"; done
                echo ""
              fi
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
            else
              echo "Initial release."
            fi
          } > changelog.md

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat changelog.md > body.md
          echo "" >> body.md
          if [[ "${{ needs.build.outputs.is_prerelease }}" == "true" ]]; then
            cat >> body.md <<EOF
          ## Container Images

          \`\`\`bash
          docker pull ghcr.io/manchtools/power-manage-control:latest-rc
          docker pull ghcr.io/manchtools/power-manage-gateway:latest-rc
          docker pull ghcr.io/manchtools/power-manage-indexer:latest-rc
          \`\`\`

          Or pull this specific version:

          \`\`\`bash
          docker pull ghcr.io/manchtools/power-manage-control:${VERSION}
          docker pull ghcr.io/manchtools/power-manage-gateway:${VERSION}
          docker pull ghcr.io/manchtools/power-manage-indexer:${VERSION}
          \`\`\`
          EOF
          else
            cat >> body.md <<EOF
          ## Container Images

          \`\`\`bash
          docker pull ghcr.io/manchtools/power-manage-control:latest
          docker pull ghcr.io/manchtools/power-manage-gateway:latest
          docker pull ghcr.io/manchtools/power-manage-indexer:latest
          \`\`\`

          Or pull this specific version:

          \`\`\`bash
          docker pull ghcr.io/manchtools/power-manage-control:${VERSION}
          docker pull ghcr.io/manchtools/power-manage-gateway:${VERSION}
          docker pull ghcr.io/manchtools/power-manage-indexer:${VERSION}
          \`\`\`
          EOF
          fi
          cat >> body.md <<'EOF'

          ## Binaries

          | Binary | Platform |
          |--------|----------|
          | `control-linux-amd64` | Linux x86_64 |
          | `control-linux-arm64` | Linux ARM64 |
          | `gateway-linux-amd64` | Linux x86_64 |
          | `gateway-linux-arm64` | Linux ARM64 |
          | `indexer-linux-amd64` | Linux x86_64 |
          | `indexer-linux-arm64` | Linux ARM64 |
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}
          name: Power Manage Server ${{ steps.version.outputs.version }}
          files: release/*
          body_path: body.md
